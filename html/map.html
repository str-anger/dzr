<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="60">
    <title>Team Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var markers = {{ markers|tojson }};
        var cambridge = [52.2053, 0.1218];
        var map = L.map("map");
        L.tileLayer("https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png", {
            maxZoom: 20,
            attribution: "CyclOSM"
        }).addTo(map);
        var colors = ["#e6194b", "#3cb44b", "#4363d8", "#f58231", "#911eb4",
                      "#42d4f4", "#f032e6", "#bfef45", "#fabed4", "#469990"];
        var teamColors = {};
        var colorIndex = 0;
        function getTeamColor(team) {
            if (!teamColors[team]) {
                teamColors[team] = colors[colorIndex % colors.length];
                colorIndex++;
            }
            return teamColors[team];
        }
        var allPos = [];
        for (var i = 0; i < markers.length; i++) {
            var m = markers[i];
            var pos = [m.lat, m.lon];
            allPos.push(pos);
            var color = getTeamColor(m.team);
            var icon = L.divIcon({
                className: "custom-marker",
                html: "<div style='background:" + color + ";width:12px;height:12px;border-radius:50%;border:2px solid #fff;'></div>",
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });
            L.marker(pos, {icon: icon}).addTo(map)
                .bindTooltip(m.team + " -" + m.mins + "m", {
                    permanent: true,
                    direction: "right",
                    offset: [8, 0]
                });
        }
        if (allPos.length === 0) {
            map.setView(cambridge, 13);
        } else if (allPos.length === 1) {
            var p = allPos[0];
            var pad = 0.009;
            map.fitBounds([[p[0] - pad, p[1] - pad * 1.6], [p[0] + pad, p[1] + pad * 1.6]]);
        } else {
            var bounds = L.latLngBounds(allPos);
            bounds = bounds.pad(0.1);
            var latPad = 0.0045;
            var lonPad = 0.0073;
            var sw = bounds.getSouthWest();
            var ne = bounds.getNorthEast();
            map.fitBounds([[sw.lat - latPad, sw.lng - lonPad], [ne.lat + latPad, ne.lng + lonPad]]);
        }
    </script>
</body>
</html>
