<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 15px; max-width: 500px; margin: 0 auto; font-size: 18px; }
        h1 { font-size: 2em; margin-bottom: 20px; }
        .error { background-color: #ffcccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; font-size: 1em; }
        form { margin-top: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 1.05em; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px; font-size: 18px; border: 2px solid #ccc; border-radius: 5px; margin-bottom: 15px; }
        button { width: 100%; padding: 16px; font-size: 1.15em; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:active { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>Login</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <label>Team:</label>
        <input type="text" name="team" required>
        <label>Password:</label>
        <input type="password" name="password" required>
        <button type="submit">Login</button>
    </form>
</body>
</html>
